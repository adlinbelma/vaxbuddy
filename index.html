// ── Helpers ──
function uid(){return crypto.randomUUID();}
function calcDue(dob,am){
  const d=new Date(dob),w=Math.floor(am),f=am-w;
  d.setMonth(d.getMonth()+w);
  if(f>0)d.setDate(d.getDate()+Math.round(f*30));
  return d.toISOString().split("T")[0];
}
function getAgeLabel(m){
  if(m===0)return"Birth";if(m<1)return`${Math.round(m*4)}w`;
  if(m<12)return`${m}m`;
  const y=Math.floor(m/12),mo=Math.round(m%12);
  return mo>0?`${y}y ${mo}m`:`${y}y`;
}
function getStatus(due,done){
  if(done)return{type:"done",label:"Done",color:P.green,bg:P.greenLight};
  const t=new Date();t.setHours(0,0,0,0);
  const d=new Date(due);d.setHours(0,0,0,0);
  const diff=Math.round((d-t)/86400000);
  if(diff<0)return{type:"overdue",label:`${Math.abs(diff)}d overdue`,color:P.red,bg:P.redLight,diff};
  if(diff===0)return{type:"today",label:"Due today!",color:P.orange,bg:P.orangeLight,diff};
  if(diff<=7)return{type:"soon",label:`In ${diff}d`,color:P.yellow,bg:P.yellowLight,diff};
  if(diff<=30)return{type:"upcoming",label:`In ${diff}d`,color:P.teal,bg:P.tealLight,diff};
  return{type:"future",label:new Date(due).toLocaleDateString("en-IN",{day:"numeric",month:"short",year:"numeric"}),color:"#94A3B8",bg:"#F1F5F9",diff};
}

const notifiedThisSession=new Set();
function scheduleReminders(vaccines,childName){
  if(!("Notification"in window)||Notification.permission!=="granted")return;
  vaccines.forEach(v=>{
    if(v.done)return;
    const key=v.id+":"+new Date().toDateString();
    if(notifiedThisSession.has(key))return;
    const st=getStatus(v.due_date,false);
    if(["overdue","today","soon"].includes(st.type)){
      const body=st.type==="overdue"?`${v.name} is ${st.label}!`:
                 st.type==="today"?`${v.name} is due today!`:
                 `${v.name} due in ${st.diff} days`;
      new Notification(`💉 ${childName}`,{body,icon:"https://i.ibb.co/8LrwgPbc/BCF2-E111-3-A8-C-4-DDF-B48-A-587-EAF49-C166.png"});
      notifiedThisSession.add(key);
    }
  });
}

// PDF Export Function
function generateVaccinePDF(profile,vaccines){
  if(typeof jspdf==="undefined"||!jspdf.jsPDF){
    alert("PDF library failed to load. Please refresh and try again.");
    return;
  }
  const{jsPDF}=jspdf;
  const doc=new jsPDF("p","mm","a4");
  const pageWidth=doc.internal.pageSize.getWidth();
  const pageHeight=doc.internal.pageSize.getHeight();
  let yPos=15;
  const margin=12;
  const contentWidth=pageWidth-(2*margin);

  // Title
  doc.setFont("helvetica","bold");
  doc.setFontSize(20);
  doc.text("Vaccination Record",margin,yPos);
  yPos+=12;

  // Child Info
  doc.setFontSize(11);
  doc.setFont("helvetica","normal");
  const dobDate=new Date(profile.dob);
  const dobStr=dobDate.toLocaleDateString("en-IN",{day:"numeric",month:"long",year:"numeric"});
  doc.text(`Child: ${profile.name}`,margin,yPos);
  yPos+=6;
  doc.text(`Date of Birth: ${dobStr}`,margin,yPos);
  yPos+=6;

  const today=new Date().toLocaleDateString("en-IN",{day:"numeric",month:"long",year:"numeric"});
  doc.setFontSize(9);
  doc.setFont("helvetica","italic");
  doc.text(`Generated: ${today}`,margin,yPos);
  yPos+=10;

  // Section Header
  doc.setFont("helvetica","bold");
  doc.setFontSize(12);
  doc.text("Administered Vaccines",margin,yPos);
  yPos+=8;

  // Table Headers
  doc.setFont("helvetica","bold");
  doc.setFontSize(10);
  doc.setFillColor(165,85,247); // purple
  doc.setTextColor(255,255,255);
  doc.rect(margin,yPos-4,contentWidth,6,"F");
  doc.text("Vaccine Name",margin+2,yPos);
  doc.text("Date Administered",margin+100,yPos);
  doc.text("Type",margin+170,yPos);
  yPos+=8;

  // Table Rows
  doc.setFont("helvetica","normal");
  doc.setFontSize(9);
  doc.setTextColor(0,0,0);

  vaccines.forEach((v,idx)=>{
    if(yPos>pageHeight-20){
      doc.addPage();
      yPos=15;
    }
    const doneDate=v.done_date?new Date(v.done_date).toLocaleDateString("en-IN",{day:"numeric",month:"short",year:"numeric"}):"—";
    const type=v.custom?"Custom":"IAP";
    const bg=idx%2===0?"#F8FAFC":"white";
    if(bg==="#F8FAFC"){
      doc.setFillColor(248,250,252);
      doc.rect(margin,yPos-3.5,contentWidth,6,"F");
    }
    doc.text(v.name,margin+2,yPos);
    doc.text(doneDate,margin+100,yPos);
    doc.text(type,margin+170,yPos);
    yPos+=6;

    // Add OCR vaccine data if available in notes
    if(v.notes){
      doc.setFont("helvetica","normal");
      doc.setFontSize(8);
      doc.setTextColor(75,85,99); // darker gray
      const notesText=doc.splitTextToSize(v.notes,contentWidth-4);
      notesText.forEach(line=>{
        if(yPos>pageHeight-20){
          doc.addPage();
          yPos=15;
        }
        doc.text(line,margin+4,yPos);
        yPos+=4;
      });
    }
  });

  // Footer
  yPos=pageHeight-10;
  doc.setFontSize(8);
  doc.setFont("helvetica","italic");
  doc.setTextColor(148,163,184);
  doc.text("This record was generated from VaxBuddy vaccine tracking app.",margin,yPos);

  // Save
  doc.save(`${profile.name}_vaccination_record.pdf`);
}

// OCR Image Preprocessing Function
function preprocessImageForOCR(imageDataUrl,callback){
  const img=new Image();
  img.onload=()=>{
    const canvas=document.createElement("canvas");
    const ctx=canvas.getContext("2d");

    // Set canvas size - upscale if image is small
    let width=img.width;
    let height=img.height;
    if(width<600){
      const scale=600/width;
      width=600;
      height=Math.round(height*scale);
    }

    canvas.width=width;
    canvas.height=height;

    // Draw image
    ctx.drawImage(img,0,0,width,height);

    // Get image data
    let imageData=ctx.getImageData(0,0,width,height);
    const data=imageData.data;

    // Convert to grayscale and increase contrast
    for(let i=0;i<data.length;i+=4){
      const r=data[i],g=data[i+1],b=data[i+2];
      const gray=0.299*r+0.587*g+0.114*b;

      // Increase contrast
      const contrast=1.5;
      const adjusted=Math.min(255,Math.max(0,(gray-128)*contrast+128));

      data[i]=adjusted;
      data[i+1]=adjusted;
      data[i+2]=adjusted;
    }

    ctx.putImageData(imageData,0,0);
    callback(canvas.toDataURL("image/jpeg",0.95));
  };
  img.src=imageDataUrl;
}

// OCR Extraction Function using Tesseract.js
async function extractVaccineDataFromImage(imageDataUrl){
  try{
    if(typeof Tesseract==="undefined"){
      return{error:"OCR library not loaded. Please refresh and try again."};
    }

    console.log("Starting Tesseract.js OCR...");
    const{createWorker}=Tesseract;
    console.log("Creating worker...");
    const worker=await createWorker("eng");

    console.log("Worker created, recognizing image...");
    const result=await worker.recognize(imageDataUrl);
    const text=result.data.text||"";
    console.log("Recognition complete, text length:",text.length);
    console.log("Extracted text preview:",text.substring(0,200));
    await worker.terminate();
    console.log("Worker terminated");

    // Simple parsing for vaccine information
    const extractedData={
      vaccineName:"",
      batchNumber:"",
      expiryDate:"",
      manufacturer:"",
      dateManufactured:"",
      lotNumber:"",
      rawText:text
    };

    // Parse batch/lot number (multiple patterns)
    let batchMatch=text.match(/(?:LOT|BATCH|B\.?|Lot\s+No)[:\s]+([A-Z0-9\/\-]+)/i);
    if(batchMatch){
      extractedData.batchNumber=batchMatch[1].trim();
    }else{
      // Try alternative patterns: numbers after Mfg Lic No or similar
      batchMatch=text.match(/(?:Mfg\s+Lic\s+No|License)[:\s\.]+([0-9A-Z\/]+)/i);
      if(batchMatch)extractedData.batchNumber=batchMatch[1].trim().substring(0,30);
    }
    if(!extractedData.batchNumber){
      // Look for any standalone alphanumeric code (common batch number format)
      const codeMatch=text.match(/([0-9]{4,}[\-A-Z0-9]{0,10})/);
      if(codeMatch)extractedData.batchNumber=codeMatch[1].trim();
    }

    // Parse expiry date (multiple formats: EXP, EXPIRY, Use By, Valid Till)
    let expiryMatch=text.match(/(?:EXP|EXPIRY|Use\s+By|Valid\s+Till|Exp\s+Date)[:\s\.]+(\d{1,2}[\/\-]\d{1,2}[\/\-]\d{2,4})/i);
    if(expiryMatch){
      extractedData.expiryDate=expiryMatch[1].trim();
    }else{
      // Try month/year format (MM/YYYY or MM-YYYY)
      expiryMatch=text.match(/(?:EXP|EXPIRY)[:\s\.]+(\d{1,2}[\/\-]\d{4})/i);
      if(expiryMatch)extractedData.expiryDate=expiryMatch[1].trim();
    }

    // Parse manufacturer (multiple patterns)
    let mfrMatch=text.match(/(?:MFR|MANUFACTURER|Made\s+by|Mfg\s+by)[:\s\.]+([^\n]+)/i);
    if(mfrMatch){
      extractedData.manufacturer=mfrMatch[1].trim().substring(0,50);
    }else{
      // Look for company names after "by" or at start of lines with capitals
      mfrMatch=text.match(/(?:by\s+|Produced\s+by\s+)([A-Z][A-Za-z\s]+)/);
      if(mfrMatch)extractedData.manufacturer=mfrMatch[1].trim().substring(0,50);
    }

    // Parse date manufactured (MFD, MANUFACTURED, Date Mfg)
    let mfgMatch=text.match(/(?:MFD|MANUFACTURED|Date\s+Mfg|Mfg\s+Date)[:\s\.]+(\d{1,2}[\/\-]\d{1,2}[\/\-]\d{2,4})/i);
    if(mfgMatch){
      extractedData.dateManufactured=mfgMatch[1].trim();
    }else{
      // Try month/year format
      mfgMatch=text.match(/(?:MFD|MANUFACTURED)[:\s\.]+(\d{1,2}[\/\-]\d{4})/i);
      if(mfgMatch)extractedData.dateManufactured=mfgMatch[1].trim();
    }

    // Parse lot number (if not already found as batch)
    if(!extractedData.batchNumber){
      const lotMatch=text.match(/(?:LOT\s+No|Lot)[:\s\.]+([A-Z0-9\/\-]+)/i);
      if(lotMatch)extractedData.lotNumber=lotMatch[1].trim();
    }

    // Try to extract vaccine name (comprehensive list of Indian vaccine names)
    const vaccinePatterns=[
      "Hepatitis A","Hepatitis B","Hepatitis","BCG","DTP","IPV","OPV","Hib","PCV","Rotavirus","MMR","Varicella",
      "HPV","Influenza","Typhoid","Tdap","Meningococcal","Meningo","JE","Japanese Encephalitis",
      "Polio","Pneumococcal","Measles","Rubella","Mumps","Varicella","Diphtheria","Pertussis","Tetanus",
      "HAPTREV","VAXIGRIP","PENTAXIM","HEXAXIM","ROTAVIRUS","PNEUMO","ROTAVAC"
    ];
    for(const pattern of vaccinePatterns){
      if(text.toUpperCase().includes(pattern.toUpperCase())){
        extractedData.vaccineName=pattern;
        console.log("Found vaccine name:",pattern);
        break;
      }
    }

    // If no vaccine name found, try to extract from first meaningful line
    if(!extractedData.vaccineName){
      const lines=text.split('\n').filter(l=>l.trim().length>5);
      if(lines.length>0){
        extractedData.vaccineName=lines[0].trim().substring(0,50);
      }
    }

    return extractedData;
  }catch(e){
    console.error("OCR Error:",e);
    return{error:e.message||"Failed to extract vaccine data from image"};
  }
}

// ── Supabase helpers with error handling ──
async function dbRun(fn,onErr){
  try{
    const res=await fn();
    if(res.error)throw res.error;
    return res;
  }catch(e){
    console.error(e);
    if(onErr)onErr(e.message||"Something went wrong");
    return null;
  }
}

      if(event==="INITIAL_SESSION"||event==="SIGNED_IN"){
        setSession(session);
        if(session)loadProfiles(session.user.id);
        else setLoading(false);
      }else if(event==="TOKEN_REFRESHED"){
        // Token refreshed silently - only update if session exists
        if(session)setSession(session);
      }else if(event==="SIGNED_OUT"){
        // User explicitly signed out or session actually expired
        setSession(null);setProfiles([]);setLoading(false);setView("home");
        showToast("You've been signed out. Please log in again.","error");
      }
    });
    return()=>subscription.unsubscribe();
  },[]);

  async function loadProfiles(uid){
    setLoading(true);
    const res=await dbRun(()=>sb.from("profiles").select("*").eq("user_id",uid).order("created_at"),errToast);
    if(!res){setLoading(false);return;}
    const profs=res.data||[];
    const full=await Promise.all(profs.map(async p=>{
      const vres=await dbRun(()=>sb.from("vaccines").select("*").eq("profile_id",p.id).order("age_months"),errToast);
      // FIX #5: resolve signed URLs for private photos
      let photoUrl=null;
      if(p.photo_url){
        photoUrl=p.photo_url.startsWith("data:")?p.photo_url:await getSignedUrl(p.photo_url).catch(()=>p.photo_url);
      }
      return{...p,photo_url:photoUrl,vaccines:vres?.data||[]};
    }));
    setProfiles(full);
    setLoading(false);
    if(Notification.permission==="granted")full.forEach(p=>scheduleReminders(p.vaccines,p.name));
  }

  // FIX #11: Check for existing profiles before migrating
  async function migrateLocalData(){
    if(!localData||!session||migrating)return;
    setMigrating(true);
    const{data:existing}=await sb.from("profiles").select("id").eq("user_id",session.user.id);
    if(existing?.length>0){
      showToast("Account already has data. Skipping import to avoid duplicates.","error");
      setLocalData(null);localStorage.removeItem(LOCAL_KEY);setMigrating(false);return;
    }
    try{
      for(const p of localData.profiles){
        const{data:prof,error}=await sb.from("profiles").insert({
          id:uid(),user_id:session.user.id,name:p.name,dob:p.dob,avatar:p.avatar,photo_url:null
        }).select().single();
        if(error)throw error;
        if(prof){
          const vaxRows=p.vaccines.map(v=>({
            id:uid(),profile_id:prof.id,user_id:session.user.id,
            name:v.name,due_date:v.dueDate,done:v.done,done_date:v.doneDate||null,
            notes:v.notes||null,age_months:v.ageMonths,custom:v.custom||false,reminder_set:false,
          }));
          const{error:ve}=await sb.from("vaccines").insert(vaxRows);
          if(ve)throw ve;
        }
      }
      localStorage.removeItem(LOCAL_KEY);
      setLocalData(null);
      await loadProfiles(session.user.id);
      showToast("Local data imported successfully!");
    }catch(e){errToast(e.message||"Import failed");}
    setMigrating(false);
  }

  // FIX #2: Strict photo upload — fail hard, no base64 fallback to DB
  async function uploadPhoto(file){
    const ext=file.name.split(".").pop().toLowerCase();
    const allowed=["jpg","jpeg","png","webp","heic"];
    if(!allowed.includes(ext)){errToast("Unsupported image format");return null;}
    if(file.size>5*1024*1024){errToast("Photo must be under 5MB");return null;}
    const path=`${session.user.id}/${uid()}.${ext}`;
    const{error}=await sb.storage.from("photos").upload(path,file,{upsert:true});
    if(error){errToast("Photo upload failed: "+error.message);return null;}
    return path; // store path, not public URL
  }

    setSaving(true);
    try{
      let photoPath=null;
      if(newP.photoFile){
        photoPath=await uploadPhoto(newP.photoFile);
        if(newP.photoFile&&!photoPath){setSaving(false);return;} // upload failed
      }
      const profId=uid();
      const{error}=await sb.from("profiles").insert({
        id:profId,user_id:session.user.id,name:newP.name.trim(),
        dob:newP.dob,avatar:newP.avatar,photo_url:photoPath
      });
      if(error)throw error;
      const vaxRows=IAP.map(v=>({
        id:uid(),profile_id:profId,user_id:session.user.id,
        name:v.name,due_date:calcDue(newP.dob,v.am),done:false,

  async function saveEditProfile(){
    if(!editProfile.name.trim()||!editProfile.dob){showToast("Name and DOB required","error");return;}
    setSaving(true);
    try{
      let photoPath=sel.photo_url||null;
      if(editProfile.photoFile){
        const p=await uploadPhoto(editProfile.photoFile);
        if(!p){setSaving(false);return;}
        photoPath=p;
      }else if(editProfile.photo===null){
        photoPath=null;
      }
      const dobChanged=editProfile.dob!==sel.dob;
      const{error}=await sb.from("profiles").update({
        name:editProfile.name.trim(),dob:editProfile.dob,
        avatar:editProfile.avatar,photo_url:photoPath
      }).eq("id",sel.id);
      if(error)throw error;
      if(dobChanged){
        const updates=sel.vaccines.filter(v=>!v.custom).map(v=>
          sb.from("vaccines").update({due_date:calcDue(editProfile.dob,v.age_months)}).eq("id",v.id)
        );
        const results=await Promise.all(updates);
        const failed=results.find(r=>r.error);
        if(failed)throw failed.error;
      }
      setEditProfile(null);
      await loadProfiles(session.user.id);
      showToast("Profile updated!");
    }catch(e){errToast(e.message||"Failed to update profile");}
    setSaving(false);
  }

    setDeletingId(id);
    try{

  // FIX #9: Confetti only after confirmed DB write
  async function confirmMarkDone(vid,ocrDataParam=null){
    const vaccine = sel.vaccines.find(v=>v.id===vid);
    const today = new Date().toISOString().split("T")[0];
    const dateToSave = givenDate && givenDate.trim() ? givenDate : (vaccine?.due_date || today);

    // Build notes from OCR data if available
    let notesToSave = vaccine?.notes || null;
    if(ocrDataParam){
      const ocrNotes = `Batch: ${ocrDataParam.batchNumber || "—"}, Exp: ${ocrDataParam.expiryDate || "—"}, Mfr: ${ocrDataParam.manufacturer || "—"}`;
      notesToSave = ocrNotes;
    }

    setMarkingDoneId(vid);
    try{
      const{error}=await sb.from("vaccines").update({done:true,done_date:dateToSave,reminder_set:false,notes:notesToSave}).eq("id",vid);
      if(error)throw error;
      fireConfetti(); // only fires after success
      setMarkingDone(null);
      setGivenDate(""); // clear the date field
      // FIX #8: Optimistic local state update
      setProfiles(prev=>prev.map(p=>p.id!==selId?p:{...p,
        vaccines:p.vaccines.map(v=>v.id!==vid?v:{...v,done:true,done_date:dateToSave,reminder_set:false,notes:notesToSave})
      }));
    }catch(e){errToast(e.message||"Failed to update vaccine");}finally{setMarkingDoneId(null);}
  }

              <button onClick={migrateLocalData} disabled={migrating} style={{flex:1,padding:"8px",borderRadius:10,background:P.purple,color:"white",fontWeight:700,fontSize:12}}>{migrating?"Importing...":"Yes, import"}</button>
              <button onClick={()=>{setLocalData(null);localStorage.removeItem(LOCAL_KEY);}} style={{padding:"8px 12px",borderRadius:10,background:"white",color:"#64748B",fontSize:12}}>Discard</button>
            </div>
          </div>
        )}

        {totalOverdue>0&&(
          <div style={{background:P.redLight,border:`1.5px solid ${P.red}`,borderRadius:14,padding:"10px 14px",marginBottom:14,display:"flex",alignItems:"center",gap:10}} role="alert">
            <span style={{fontSize:22}} aria-label="warning">🚨</span>
            <div>
              <p style={{margin:0,fontWeight:700,fontSize:13,color:P.redDark}}>{totalOverdue} vaccine{totalOverdue>1?"s":""} overdue!</p>
              <p style={{margin:0,fontSize:12,color:P.red}}>Tap a child to view details</p>
            </div>
          </div>
        )}

        {profiles.map(p=>{
          const total=p.vaccines.length,done=p.vaccines.filter(v=>v.done).length;
          const overdue=p.vaccines.filter(v=>!v.done&&new Date(v.due_date)<new Date()).length;
          const soon=p.vaccines.filter(v=>!v.done&&getStatus(v.due_date).diff>=0&&getStatus(v.due_date).diff<=7).length;
          const pct=Math.round(done/total*100);
          const ageMs=Date.now()-new Date(p.dob).getTime();
          const ageYears=Math.floor(ageMs/1000/60/60/24/365.25);
          const ageMos=Math.floor((ageMs/1000/60/60/24/365.25%1)*12);
          const ageStr=ageYears>0?`${ageYears}y ${ageMos}m old`:`${Math.floor(ageMs/1000/60/60/24/30)}m old`;
          return(
            <div key={p.id} onClick={()=>{setSelId(p.id);setView("child");setTab("upcoming");setExpanded(null);}} role="button" tabIndex={0} aria-label={`${p.name}, ${done} of ${total} vaccines completed`}
              style={{background:"white",border:"1.5px solid #F1F5F9",borderRadius:18,padding:"14px 16px",marginBottom:10,cursor:"pointer",boxShadow:"0 2px 8px rgba(0,0,0,0.05)"}}>
              <div style={{display:"flex",alignItems:"center",gap:12}}>
                <div style={{width:52,height:52,borderRadius:"50%",background:`linear-gradient(135deg,${P.pinkLight},${P.purpleLight})`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:26,border:`2px solid ${P.pink}44`,flexShrink:0,overflow:"hidden"}}>
                  {p.photo_url?<img src={p.photo_url} style={{width:"100%",height:"100%",objectFit:"cover"}}/>:p.avatar}
                </div>
                <div style={{flex:1}}>
                  <p style={{margin:0,fontWeight:700,fontSize:16,color:"#1E293B"}}>{p.name}</p>
                  <p style={{margin:"2px 0 6px",fontSize:12,color:"#94A3B8"}}>{ageStr}</p>
                  <div style={{background:"#F1F5F9",borderRadius:20,height:6,overflow:"hidden"}}>
                    <div style={{height:6,borderRadius:20,width:`${pct}%`,background:`linear-gradient(90deg,${P.pink},${P.purple})`}}/>
                  </div>
                  <p style={{margin:"4px 0 0",fontSize:11,color:"#94A3B8"}}>{done}/{total} completed ({pct}%)</p>
                </div>
              </div>
              <div style={{display:"flex",gap:6,marginTop:10,flexWrap:"wrap"}}>
                {overdue>0&&<span style={{fontSize:11,padding:"3px 10px",borderRadius:20,background:P.redLight,color:P.redDark,fontWeight:600}}>{overdue} overdue</span>}
                {soon>0&&<span style={{fontSize:11,padding:"3px 10px",borderRadius:20,background:P.yellowLight,color:P.yellowDark,fontWeight:600}}>⏰ {soon} this week</span>}
                <span style={{fontSize:11,padding:"3px 10px",borderRadius:20,background:P.greenLight,color:P.greenDark,fontWeight:600}}>{done} done</span>
              </div>
            </div>
          );
        })}

        {profiles.length===0&&!showAdd&&(
          <div style={{textAlign:"center",padding:"3rem 1rem"}}>
            <p style={{fontSize:48,margin:0}}>👶</p>
            <p style={{fontWeight:700,color:"#1E293B",margin:"10px 0 4px",fontSize:16}}>No children added yet</p>
            <p style={{fontSize:13,color:"#94A3B8"}}>Add your first child to get started</p>
          </div>
        )}

        {!showAdd&&<button onClick={()=>setShowAdd(true)} aria-label="Add a new child profile" style={{width:"100%",padding:14,borderRadius:16,background:`linear-gradient(135deg,${P.pink},${P.purple})`,color:"white",fontSize:15,fontWeight:700,marginTop:6,boxShadow:`0 4px 14px ${P.pink}55`}}>+ Add a child 🌟</button>}

        {showAdd&&(
          <div style={{background:"white",border:`2px dashed ${P.pink}`,borderRadius:18,padding:16,marginTop:10}}>
            <p style={{margin:"0 0 12px",fontWeight:700,fontSize:15,color:P.pinkDark}}>New child profile</p>
            <input placeholder="Child's name *" value={newP.name} onChange={e=>setNewP({...newP,name:e.target.value})} style={{marginBottom:8}}/>
            <label style={{fontSize:12,color:"#64748B",display:"block",marginBottom:4}}>Date of birth *</label>
            <input type="date" value={newP.dob} onChange={e=>setNewP({...newP,dob:e.target.value})} max={new Date().toISOString().split("T")[0]} aria-label="Child date of birth" title="Child's date of birth" style={{marginBottom:12,WebkitAppearance:"none",fontSize:"16px"}}/>
            <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:10}}>
              <div style={{width:56,height:56,borderRadius:"50%",border:`2px dashed ${P.pink}`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:28,overflow:"hidden",flexShrink:0,background:P.pinkLight}}>
                {newP.photo?<img src={newP.photo} style={{width:"100%",height:"100%",objectFit:"cover"}}/>:newP.avatar}
              </div>
              <div style={{flex:1}}>
                <label style={{display:"block",padding:"8px 14px",borderRadius:12,background:`linear-gradient(135deg,${P.pink},${P.purple})`,color:"white",fontWeight:600,fontSize:12,textAlign:"center",cursor:"pointer"}}>
                  Upload photo
                  <input type="file" accept="image/*" style={{display:"none"}} onChange={e=>{
                    const f=e.target.files[0];if(!f)return;
                    setNewP(prev=>({...prev,photoFile:f}));
                    const r=new FileReader();r.onload=ev=>setNewP(prev=>({...prev,photo:ev.target.result}));r.readAsDataURL(f);
                  }}/>
                </label>
                {newP.photo&&<button onClick={()=>setNewP({...newP,photo:null,photoFile:null,avatar:"🐶"})} style={{marginTop:6,width:"100%",padding:"6px",borderRadius:10,background:P.redLight,color:P.redDark,fontSize:12,fontWeight:600}}>Remove</button>}
              </div>
            </div>
            <p style={{fontSize:11,color:"#94A3B8",margin:"0 0 6px"}}>Or pick an emoji</p>
            <div style={{display:"flex",flexWrap:"wrap",gap:6,marginBottom:14}}>
              {AVATARS.map(a=>(
                <span key={a} onClick={()=>setNewP({...newP,avatar:a,photo:null,photoFile:null})} style={{fontSize:22,cursor:"pointer",width:38,height:38,display:"flex",alignItems:"center",justifyContent:"center",borderRadius:10,border:`2px solid ${!newP.photo&&newP.avatar===a?P.pink:"transparent"}`,background:!newP.photo&&newP.avatar===a?P.pinkLight:"#F8FAFC"}}>{a}</span>
              ))}
            </div>
            <div style={{display:"flex",gap:8}}>
              <button onClick={addProfile} disabled={saving||!newP.name||!newP.dob} aria-label="Create child profile"
                style={{flex:1,padding:10,borderRadius:12,background:`linear-gradient(135deg,${P.pink},${P.purple})`,color:"white",fontWeight:700,opacity:(saving||!newP.name||!newP.dob)?0.6:1}}>
                {saving?"Saving...":"Create profile"}
              </button>
              <button onClick={()=>{setShowAdd(false);setNewP({name:"",dob:"",avatar:"🐶",photo:null,photoFile:null});}} aria-label="Cancel adding profile" style={{padding:"10px 16px",borderRadius:12,background:"#F1F5F9",color:"#64748B"}}>Cancel</button>
            </div>
          </div>
        )}
      </div>
    );
  }

  // ── CHILD VIEW ──
  if(view==="child"&&sel){
    const allVax=sel.vaccines;
    const overdue=allVax.filter(v=>!v.done&&new Date(v.due_date)<new Date());
    const upcoming7=allVax.filter(v=>!v.done&&getStatus(v.due_date).diff>=0&&getStatus(v.due_date).diff<=7);
    const upcoming30=allVax.filter(v=>!v.done&&getStatus(v.due_date).diff>7&&getStatus(v.due_date).diff<=30);
    const future=allVax.filter(v=>!v.done&&getStatus(v.due_date).diff>30);
    const done=allVax.filter(v=>v.done);
    const groupedFuture={};
    future.forEach(v=>{
      if(v.age_months==null)return;
      const y=Math.floor(v.age_months/12);
      const k=`${y} years`;
      if(!groupedFuture[k])groupedFuture[k]=[];
      groupedFuture[k].push(v);
    });
    const customFuture=future.filter(v=>v.age_months==null);
    const TABS=[
      {key:"upcoming",label:"Due soon",count:overdue.length+upcoming7.length},
      {key:"all",label:"All",count:allVax.length},
      {key:"done",label:"Done",count:done.length},
    ];
    return(
      <div style={{padding:"0.75rem 1rem 3rem",fontFamily:"system-ui,sans-serif"}}>
        <Toast/>
        <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:16}}>
          <button onClick={()=>{setView("home");setSelId(null);setEditProfile(null);}} aria-label="Go back to home" style={{padding:"6px 12px",borderRadius:10,background:"#F1F5F9",color:"#64748B",fontWeight:600}}>← Back</button>
          <div onClick={()=>setEditProfile({name:sel.name,dob:sel.dob,avatar:sel.avatar,photo:sel.photo_url,photoFile:null})}
            style={{width:42,height:42,borderRadius:"50%",background:`linear-gradient(135deg,${P.pinkLight},${P.purpleLight})`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:22,border:`2px solid ${P.pink}44`,overflow:"hidden",cursor:"pointer",flexShrink:0}}>
            {sel.photo_url?<img src={sel.photo_url} style={{width:"100%",height:"100%",objectFit:"cover"}}/>:sel.avatar}
          </div>
          <div style={{flex:1,minWidth:0}}>
            <p style={{margin:0,fontWeight:700,fontSize:16,color:"#1E293B"}}>{sel.name}</p>
            <p style={{margin:0,fontSize:11,color:"#94A3B8"}}>Born {new Date(sel.dob).toLocaleDateString("en-IN",{day:"numeric",month:"short",year:"numeric"})}</p>
          </div>
          <div ref={menuRef} style={{position:"relative"}}>
            <button onClick={()=>setMenuOpen(!menuOpen)} aria-label="Actions menu" aria-expanded={menuOpen} style={{padding:"6px 10px",borderRadius:10,background:"#F1F5F9",color:"#64748B",fontWeight:600,fontSize:16}}>⋮</button>
            {menuOpen&&(
              <div style={{position:"absolute",top:"100%",right:0,marginTop:6,background:"white",border:`1.5px solid ${P.purpleLight}`,borderRadius:12,boxShadow:"0 4px 12px rgba(0,0,0,0.1)",zIndex:1000,minWidth:160}} role="menu">
                <button onClick={()=>{const completedVaxes=sel.vaccines.filter(v=>v.done).sort((a,b)=>new Date(b.done_date)-new Date(a.done_date));generateVaccinePDF(sel,completedVaxes);setMenuOpen(false);}} aria-label="Export vaccination record as PDF" role="menuitem" style={{display:"flex",alignItems:"center",gap:10,width:"100%",padding:"12px 14px",border:"none",background:"none",cursor:"pointer",fontSize:14,color:"#1E293B",fontWeight:500,borderBottom:`1px solid ${P.purpleLight}`}}>
                  <span>Export PDF</span>
                </button>
                <button onClick={()=>{setEditProfile({name:sel.name,dob:sel.dob,avatar:sel.avatar,photo:sel.photo_url,photoFile:null});setMenuOpen(false);}} disabled={deletingId===sel.id} aria-label="Edit child profile" role="menuitem" style={{display:"flex",alignItems:"center",gap:10,width:"100%",padding:"12px 14px",border:"none",background:"none",cursor:"pointer",fontSize:14,color:"#1E293B",fontWeight:500,borderBottom:`1px solid ${P.purpleLight}`,opacity:deletingId===sel.id?0.5:1}}>
                  <span>Edit Profile</span>
                </button>
                <button onClick={()=>{deleteProfile(sel.id);setMenuOpen(false);}} disabled={deletingId===sel.id} aria-label="Delete child profile permanently" role="menuitem" style={{display:"flex",alignItems:"center",gap:10,width:"100%",padding:"12px 14px",border:"none",background:"none",cursor:"pointer",fontSize:14,color:P.redDark,fontWeight:500,opacity:deletingId===sel.id?0.5:1}}>
                  <span>{deletingId===sel.id?"Deleting...":"Delete Profile"}</span>
                </button>
              </div>
            )}
          </div>
        </div>

        {editProfile&&(
          <div style={{background:"white",border:`2px dashed ${P.purple}`,borderRadius:18,padding:16,marginBottom:16}}>
            <p style={{margin:"0 0 12px",fontWeight:700,fontSize:15,color:P.purpleDark}}>Edit profile</p>
            <input placeholder="Child's name *" value={editProfile.name} onChange={e=>setEditProfile({...editProfile,name:e.target.value})} style={{marginBottom:8}}/>
            <label style={{fontSize:12,color:"#64748B",display:"block",marginBottom:4}}>Date of birth *</label>
            <input type="date" value={editProfile.dob} onChange={e=>setEditProfile({...editProfile,dob:e.target.value})} max={new Date().toISOString().split("T")[0]} aria-label="Child date of birth" title="Child's date of birth" style={{marginBottom:12,WebkitAppearance:"none",fontSize:"16px"}}/>
            <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:10}}>
              <div style={{width:52,height:52,borderRadius:"50%",border:`2px dashed ${P.purple}`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:26,overflow:"hidden",flexShrink:0,background:P.purpleLight}}>
                {editProfile.photo?<img src={editProfile.photo} style={{width:"100%",height:"100%",objectFit:"cover"}}/>:editProfile.avatar}
              </div>
              <div style={{flex:1}}>
                <label style={{display:"block",padding:"7px 14px",borderRadius:12,background:`linear-gradient(135deg,${P.purple},${P.teal})`,color:"white",fontWeight:600,fontSize:12,textAlign:"center",cursor:"pointer"}}>
                  📷 Change photo
                  <input type="file" accept="image/*" style={{display:"none"}} onChange={e=>{
                    const f=e.target.files[0];if(!f)return;
                    setEditProfile(prev=>({...prev,photoFile:f}));
                    const r=new FileReader();r.onload=ev=>setEditProfile(prev=>({...prev,photo:ev.target.result}));r.readAsDataURL(f);
                  }}/>
                </label>
                {editProfile.photo&&<button onClick={()=>setEditProfile({...editProfile,photo:null,photoFile:null})} style={{marginTop:6,width:"100%",padding:"5px",borderRadius:10,background:P.redLight,color:P.redDark,fontSize:12,fontWeight:600}}>Remove</button>}
              </div>
            </div>
            <div style={{display:"flex",flexWrap:"wrap",gap:6,marginBottom:12}}>
              {AVATARS.map(a=>(
                <span key={a} onClick={()=>setEditProfile({...editProfile,avatar:a,photo:null,photoFile:null})} style={{fontSize:20,cursor:"pointer",width:34,height:34,display:"flex",alignItems:"center",justifyContent:"center",borderRadius:8,border:`2px solid ${!editProfile.photo&&editProfile.avatar===a?P.purple:"transparent"}`,background:!editProfile.photo&&editProfile.avatar===a?P.purpleLight:"#F8FAFC"}}>{a}</span>
              ))}
            </div>
            {editProfile.dob!==sel.dob&&<div style={{background:P.yellowLight,borderRadius:10,padding:"8px 12px",marginBottom:12}}><p style={{margin:0,fontSize:12,color:P.yellowDark,fontWeight:600}}>Changing DOB recalculates all IAP vaccine due dates. Custom vaccine dates are unchanged.</p></div>}
            <div style={{display:"flex",gap:8}}>
              <button onClick={saveEditProfile} disabled={saving||!editProfile.name||!editProfile.dob} aria-label="Save profile changes"
                style={{flex:1,padding:10,borderRadius:12,background:`linear-gradient(135deg,${P.purple},${P.teal})`,color:"white",fontWeight:700,opacity:(saving||!editProfile.name||!editProfile.dob)?0.6:1}}>
                {saving?"Saving...":"Save changes"}
              </button>
              <button onClick={()=>setEditProfile(null)} aria-label="Cancel profile edit" style={{padding:"10px 16px",borderRadius:12,background:"#F1F5F9",color:"#64748B"}}>Cancel</button>
            </div>
          </div>
        )}

        <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:8,marginBottom:16}}>
          {[[overdue.length,"Overdue",P.redLight,P.redDark],[upcoming7.length,"This week",P.yellowLight,P.yellowDark],[done.length,"Done",P.greenLight,P.greenDark]].map(([n,lb,bg,tc])=>(
            <div key={lb} style={{background:bg,borderRadius:14,padding:"10px 6px",textAlign:"center"}}>
              <p style={{margin:"2px 0",fontWeight:700,fontSize:20,color:tc}}>{n}</p>
              <p style={{margin:0,fontSize:10,color:tc,fontWeight:500}}>{lb}</p>
            </div>
          ))}
        </div>

        <div style={{display:"flex",gap:6,marginBottom:14,overflowX:"auto",paddingBottom:4,alignItems:"center"}} role="tablist">
          {TABS.map(t=>(
            <button key={t.key} onClick={()=>setTab(t.key)} role="tab" aria-selected={tab===t.key} aria-label={`${t.label}, ${t.count} vaccines`} style={{padding:"7px 14px",borderRadius:20,whiteSpace:"nowrap",background:tab===t.key?`linear-gradient(135deg,${P.pink},${P.purple})`:"#F1F5F9",color:tab===t.key?"white":"#64748B",fontWeight:600,fontSize:12,boxShadow:tab===t.key?`0 3px 10px ${P.pink}44`:"none",flexShrink:0}}>
              {t.label} ({t.count})
            </button>
          ))}
          <button onClick={()=>setShowCustom(!showCustom)} aria-label="Add custom vaccine" style={{padding:"7px 14px",borderRadius:20,whiteSpace:"nowrap",background:P.purpleLight,color:P.purpleDark,fontWeight:600,fontSize:12,marginLeft:"auto",flexShrink:0}}>+ Custom</button>
        </div>

        {showCustom&&(
          <div style={{background:"white",border:`2px dashed ${P.purple}`,borderRadius:16,padding:14,marginBottom:14}}>
            <p style={{margin:"0 0 10px",fontWeight:700,fontSize:14,color:P.purpleDark}}>Add custom vaccine</p>
            <input placeholder="Vaccine name *" value={newV.name} onChange={e=>setNewV({...newV,name:e.target.value})} style={{marginBottom:8}}/>
            <label style={{fontSize:12,color:"#64748B",display:"block",marginBottom:4}}>Due date *</label>
            <input type="date" value={newV.dueDate} onChange={e=>setNewV({...newV,dueDate:e.target.value})} min={sel.dob} aria-label="Vaccine due date" title="Vaccine due date" style={{marginBottom:8,WebkitAppearance:"none",fontSize:"16px"}}/>
            <input placeholder="Notes (optional)" value={newV.notes} onChange={e=>setNewV({...newV,notes:e.target.value})} style={{marginBottom:12}}/>
            <div style={{display:"flex",gap:8}}>
              <button onClick={addCustomVaccine} disabled={!newV.name||!newV.dueDate||addingCustom} aria-label="Add custom vaccine" style={{flex:1,padding:9,borderRadius:12,background:`linear-gradient(135deg,${P.purple},${P.teal})`,color:"white",fontWeight:700,opacity:(!newV.name||!newV.dueDate||addingCustom)?0.6:1}}>
                {addingCustom?"Adding...":"Add custom"}
              </button>
              <button onClick={()=>{setShowCustom(false);setNewV({name:"",dueDate:"",notes:""});}} disabled={addingCustom} aria-label="Cancel adding custom vaccine" style={{padding:"9px 14px",borderRadius:12,background:"#F1F5F9",color:"#64748B",opacity:addingCustom?0.5:1}}>Cancel</button>
            </div>
          </div>
        )}

        {tab==="upcoming"&&(
          <>
            {overdue.length>0&&<><p style={{margin:"0 0 8px",fontSize:12,fontWeight:700,color:P.redDark}}>🔴 OVERDUE</p>{overdue.map(v=><VaxCard key={v.id} v={v}/>)}</>}
            {upcoming7.length>0&&<><p style={{margin:"10px 0 8px",fontSize:12,fontWeight:700,color:P.yellowDark}}>⏰ THIS WEEK</p>{upcoming7.map(v=><VaxCard key={v.id} v={v}/>)}</>}
            {upcoming30.length>0&&<><p style={{margin:"10px 0 8px",fontSize:12,fontWeight:700,color:P.tealDark}}>THIS MONTH</p>{upcoming30.map(v=><VaxCard key={v.id} v={v}/>)}</>}
            {overdue.length===0&&upcoming7.length===0&&upcoming30.length===0&&(
              <div style={{textAlign:"center",padding:"2rem 1rem"}}>
                <p style={{fontWeight:700,color:"#1E293B",margin:"8px 0 4px"}}>All clear!</p>
                <p style={{fontSize:13,color:"#94A3B8"}}>No vaccines due soon</p>
              </div>
            )}
            {(Object.keys(groupedFuture).length>0||customFuture.length>0)&&(
              <div style={{marginTop:12}}>
                <p style={{margin:"0 0 8px",fontSize:12,fontWeight:700,color:"#94A3B8"}}>🔮 COMING UP</p>
                {Object.entries(groupedFuture).sort((a,b)=>parseInt(a[0])-parseInt(b[0])).map(([yr,vaxes])=>(
                  <details key={yr} style={{marginBottom:6}}>
                    <summary style={{fontSize:12,fontWeight:600,color:"#64748B",cursor:"pointer",padding:"8px 12px",background:"#F8FAFC",borderRadius:10,display:"flex",justifyContent:"space-between"}}>
                      <span>At {yr}</span><span style={{color:"#CBD5E1"}}>{vaxes.length} vaccines ▾</span>
                    </summary>
                    <div style={{paddingTop:6}}>{vaxes.map(v=><VaxCard key={v.id} v={v}/>)}</div>
                  </details>
                ))}
                {customFuture.length>0&&(
                  <details style={{marginBottom:6}}>
                    <summary style={{fontSize:12,fontWeight:600,color:"#64748B",cursor:"pointer",padding:"8px 12px",background:"#F8FAFC",borderRadius:10,display:"flex",justifyContent:"space-between"}}>
                      <span>Custom vaccines</span><span style={{color:"#CBD5E1"}}>{customFuture.length} ▾</span>
                    </summary>
                    <div style={{paddingTop:6}}>{customFuture.map(v=><VaxCard key={v.id} v={v}/>)}</div>
                  </details>
                )}
              </div>
            )}
          </>
        )}
        {tab==="all"&&allVax.map(v=><VaxCard key={v.id} v={v}/>)}
        {tab==="done"&&(done.length===0
          ?<div style={{textAlign:"center",padding:"2rem"}}><p style={{color:"#94A3B8",fontSize:13}}>No vaccines marked done yet</p></div>
          :done.map(v=><VaxCard key={v.id} v={v}/>)
        )}
        {ocrShowReview&&ocrData&&(
          <div role="presentation" style={{position:"fixed",top:0,left:0,right:0,bottom:0,background:"rgba(0,0,0,0.5)",display:"flex",alignItems:"flex-end",zIndex:9999}} onClick={()=>{setOcrShowReview(false);setOcrImage(null);setOcrData(null);setOcrError("");}}>
            <div role="dialog" aria-modal="true" aria-labelledby="ocr-modal-title" onClick={e=>e.stopPropagation()} style={{width:"100%",maxHeight:"90vh",background:"white",borderRadius:"20px 20px 0 0",overflow:"auto",maxWidth:480}}>
          <div style={{padding:"16px 16px 0",borderBottom:"1px solid #E2E8F0"}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
              <h2 id="ocr-modal-title" style={{margin:0,fontSize:16,fontWeight:700,color:"#1E293B"}}>Review vaccine data</h2>
              <button onClick={()=>{setOcrShowReview(false);setOcrImage(null);setOcrData(null);setOcrError("");}} aria-label="Close review modal" style={{background:"none",padding:8,fontSize:18,cursor:"pointer",color:"#94A3B8"}}>✕</button>
            </div>
          </div>

          <div style={{padding:"16px"}}>
            {ocrImage&&(
              <div style={{marginBottom:12,borderRadius:10,overflow:"hidden",border:"1.5px solid #E2E8F0"}}>
                <img src={ocrImage} style={{width:"100%",maxHeight:300,objectFit:"cover"}} alt="Vaccine label"/>
              </div>
            )}

            {ocrLoading&&(
              <div style={{textAlign:"center",padding:"20px"}}>
                <div className="spinner" style={{marginBottom:12}}/>
                <p style={{fontSize:13,color:"#64748B",role:"status","aria-live":"polite"}}>Reading vaccine label...</p>
              </div>
            )}

            {ocrError&&(
              <div style={{padding:12,background:P.redLight,borderRadius:10,marginBottom:12,role:"alert","aria-live":"assertive"}}>
                <p style={{fontSize:12,color:P.redDark,margin:0}}>⚠️ {ocrError}</p>
              </div>
            )}

            {!ocrLoading&&ocrData&&!ocrError&&(
              <div style={{display:"flex",flexDirection:"column",gap:10}}>
                <div>
                  <label style={{fontSize:12,fontWeight:600,color:"#64748B",display:"block",marginBottom:4}}>Vaccine Name *</label>
                  <input type="text" value={ocrData.vaccineName||""} onChange={e=>setOcrData({...ocrData,vaccineName:e.target.value})} placeholder="e.g., BCG, DTP" aria-label="Vaccine name" style={{marginBottom:0}}/>
                </div>

                <div>
                  <label style={{fontSize:12,fontWeight:600,color:"#64748B",display:"block",marginBottom:4}}>Batch Number</label>
                  <input type="text" value={ocrData.batchNumber||""} onChange={e=>setOcrData({...ocrData,batchNumber:e.target.value})} placeholder="e.g., ABC123" aria-label="Batch number"/>
                </div>

                <div>
                  <label style={{fontSize:12,fontWeight:600,color:"#64748B",display:"block",marginBottom:4}}>Expiry Date</label>
                  <input type="text" value={ocrData.expiryDate||""} onChange={e=>setOcrData({...ocrData,expiryDate:e.target.value})} placeholder="e.g., 12/2027" aria-label="Expiry date"/>
                </div>

                <div>
                  <label style={{fontSize:12,fontWeight:600,color:"#64748B",display:"block",marginBottom:4}}>Manufacturer</label>
                  <input type="text" value={ocrData.manufacturer||""} onChange={e=>setOcrData({...ocrData,manufacturer:e.target.value})} placeholder="e.g., Serum Institute" aria-label="Manufacturer"/>
                </div>

                <div>
                  <label style={{fontSize:12,fontWeight:600,color:"#64748B",display:"block",marginBottom:4}}>Date Manufactured</label>
                  <input type="text" value={ocrData.dateManufactured||""} onChange={e=>setOcrData({...ocrData,dateManufactured:e.target.value})} placeholder="e.g., 01/2025" aria-label="Date manufactured"/>
                </div>

                <div>
                  <label style={{fontSize:12,fontWeight:600,color:"#64748B",display:"block",marginBottom:4}}>Lot Number</label>
                  <input type="text" value={ocrData.lotNumber||""} onChange={e=>setOcrData({...ocrData,lotNumber:e.target.value})} placeholder="e.g., LOT123" aria-label="Lot number"/>
                </div>

                <p style={{fontSize:11,color:"#94A3B8",margin:"8px 0 0"}}>You can edit any field before confirming</p>

                <div style={{display:"flex",gap:8,marginTop:12}}>
                  <button onClick={()=>{
                    if(ocrData.vaccineName){
                      confirmMarkDone(markingDone,ocrData);
                      setOcrShowReview(false);
                      setOcrImage(null);
                      setOcrData(null);
                      setOcrError("");
                    }
                  }} disabled={!ocrData.vaccineName} aria-label="Confirm vaccine data and mark as done" style={{flex:1,padding:"10px",borderRadius:12,background:P.green,color:"white",fontWeight:700,fontSize:13,opacity:!ocrData.vaccineName?0.6:1}}>
                    Confirm
                  </button>
                  <button onClick={()=>{setOcrShowReview(false);setOcrImage(null);setOcrData(null);setOcrError("");}} aria-label="Cancel without saving extracted data" style={{padding:"10px 14px",borderRadius:12,background:"#F1F5F9",color:"#64748B",fontWeight:600,fontSize:13}}>Cancel</button>
                </div>
              </div>
            )}
          </div>
            </div>
          </div>
        )}
      </div>
    );
  }

  return null;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
