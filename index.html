// ── Helpers ──
function uid(){return crypto.randomUUID();}
function calcDue(dob,am){
  const d=new Date(dob),w=Math.floor(am),f=am-w;
  d.setMonth(d.getMonth()+w);
  if(f>0)d.setDate(d.getDate()+Math.round(f*30));
  return d.toISOString().split("T")[0];
}
function getAgeLabel(m){
  if(m===0)return"Birth";if(m<1)return`${Math.round(m*4)}w`;
  if(m<12)return`${m}m`;
  const y=Math.floor(m/12),mo=Math.round(m%12);
  return mo>0?`${y}y ${mo}m`:`${y}y`;
}
function getStatus(due,done){
  if(done)return{type:"done",label:"Done",color:P.green,bg:P.greenLight};
  const t=new Date();t.setHours(0,0,0,0);
  const d=new Date(due);d.setHours(0,0,0,0);
  const diff=Math.round((d-t)/86400000);
  if(diff<0)return{type:"overdue",label:`${Math.abs(diff)}d overdue`,color:P.red,bg:P.redLight,diff};
  if(diff===0)return{type:"today",label:"Due today!",color:P.orange,bg:P.orangeLight,diff};
  if(diff<=7)return{type:"soon",label:`In ${diff}d`,color:P.yellow,bg:P.yellowLight,diff};
  if(diff<=30)return{type:"upcoming",label:`In ${diff}d`,color:P.teal,bg:P.tealLight,diff};
  return{type:"future",label:new Date(due).toLocaleDateString("en-IN",{day:"numeric",month:"short",year:"numeric"}),color:"#94A3B8",bg:"#F1F5F9",diff};
}

// Parse vaccine details from notes field (handles both JSON and legacy formats)
function parseVaccineDetails(notesString){
  if(!notesString)return{details:[]};
  try{
    if(notesString.trim().startsWith("{")){
      const parsed=JSON.parse(notesString);
      return{details:parsed.details||[]};
    }
  }catch(e){}
  // Legacy format: "Batch: X, Exp: Y, Mfr: Z"
  // Try to extract details from pipe-separated format
  const parts=notesString.split("|");
  const detailsPart=parts[0].trim();
  const batchMatch=detailsPart.match(/Batch:\s*([^,]*)/);
  const expMatch=detailsPart.match(/Exp:\s*([^,]*)/);
  const mfrMatch=detailsPart.match(/Mfr:\s*([^,]*)/);
  const mfgMatch=detailsPart.match(/Mfg:\s*([^,]*)/);
  if(batchMatch||expMatch||mfrMatch||mfgMatch){
    return{details:[{
      id:uid(),
      batch:batchMatch?batchMatch[1].trim():"",
      expiry:expMatch?expMatch[1].trim():"",
      manufacturer:mfrMatch?mfrMatch[1].trim():"",
      dateManufactured:mfgMatch?mfgMatch[1].trim():"",
      photos:[]
    }]};
  }
  return{details:[]};
}

// Serialize vaccine details array to JSON string for storage
function serializeVaccineDetails(detailsArray){
  if(!detailsArray||detailsArray.length===0)return null;
  // Filter out entries with no fields filled
  const filtered=detailsArray.filter(d=>d.name||d.batch||d.expiry||d.manufacturer||d.dateManufactured||d.photos?.length);
  if(filtered.length===0)return null;
  return JSON.stringify({details:filtered});
}

function scheduleReminders(vaccines,childName){
  if(!("Notification"in window)||Notification.permission!=="granted")return;
  const notifiedToday=getNotifiedToday();
  vaccines.forEach(v=>{
    if(v.done)return;
    if(notifiedToday.has(v.id))return; // Already notified today for this vaccine
    const st=getStatus(v.due_date,false);
    if(["overdue","today","soon"].includes(st.type)){
      const body=st.type==="overdue"?`${v.name} is ${st.label}!`:
                 st.type==="today"?`${v.name} is due today!`:
                 `${v.name} due in ${st.diff} days`;
      new Notification(`💉 ${childName}`,{body,icon:"https://i.ibb.co/8LrwgPbc/BCF2-E111-3-A8-C-4-DDF-B48-A-587-EAF49-C166.png"});
      notifiedToday.add(v.id);
    }
  });
  setNotifiedToday(notifiedToday);
}

  doc.setFont("helvetica","bold");
  doc.setFontSize(12);
  doc.text("Administered Vaccines",margin,yPos);
  yPos+=8;

  // Table Headers
  doc.setFont("helvetica","bold");
  doc.setFontSize(10);
  doc.setFillColor(165,85,247); // purple
  doc.setTextColor(255,255,255);
  doc.rect(margin,yPos-4,contentWidth,6,"F");
  doc.text("Vaccine Name",margin+2,yPos);
  doc.text("Date Administered",margin+100,yPos);
  doc.text("Type",margin+170,yPos);

  const getAgeMonthsForPdf=(v)=>{

    const doneMs=new Date(v.done_date).getTime();
    return(doneMs-dobMs)/(1000*60*60*24*30.44);
  };

  const sortedVaccines=[...vaccines].sort((a,b)=>getAgeMonthsForPdf(a)-getAgeMonthsForPdf(b));

  sortedVaccines.forEach((v,idx)=>{
    if(yPos>pageHeight-20){
      doc.addPage();
      yPos=15;
    }
    const doneDate=v.done_date?new Date(v.done_date).toLocaleDateString("en-IN",{day:"numeric",month:"short",year:"numeric"}):"—";
    const type=v.custom?"Custom":"IAP";
    const bg=idx%2===0?"#F8FAFC":"white";
    if(bg==="#F8FAFC"){
      doc.setFillColor(248,250,252);
      doc.rect(margin,yPos-3.5,contentWidth,6,"F");
    }
    doc.text(v.name,margin+2,yPos);
    doc.text(doneDate,margin+100,yPos);
    doc.text(type,margin+170,yPos);
    yPos+=6;

    // Add vaccine details if available in notes
    if(v.notes){
      doc.setFont("helvetica","normal");
      doc.setFontSize(8);
      doc.setTextColor(75,85,99); // darker gray

      // Parse notes to extract vaccine details (handles both JSON and legacy formats)
      const parsed=parseVaccineDetails(v.notes);
      if(parsed.details&&parsed.details.length>0){
        parsed.details.forEach((detail,detailIdx)=>{
          if(yPos>pageHeight-20){
            doc.addPage();
            yPos=15;
          }
          // Injection header if multiple details
          if(parsed.details.length>1){
            doc.setFont("helvetica","bold");
            doc.setFontSize(8);
            doc.text(`Injection ${detailIdx+1}:`,margin+2,yPos);
            yPos+=3;
          }
          doc.setFont("helvetica","normal");
          doc.setFontSize(8);
          // Display all detail fields
          if(detail.name){
            doc.text(`  Name: ${detail.name}`,margin+2,yPos);
            yPos+=3;
          }
          if(detail.batch){
            doc.text(`  Batch: ${detail.batch}`,margin+2,yPos);
            yPos+=3;
          }
          if(detail.expiry){
            doc.text(`  Expiry: ${detail.expiry}`,margin+2,yPos);
            yPos+=3;
          }
          if(detail.manufacturer){
            doc.text(`  Manufacturer: ${detail.manufacturer}`,margin+2,yPos);
            yPos+=3;
          }
          if(detail.dateManufactured){
            doc.text(`  Date Mfg: ${detail.dateManufactured}`,margin+2,yPos);
            yPos+=3;
          }
          // Note: Photos not included in PDF (storage limitation)
          if(detail.photos&&detail.photos.length>0){
            doc.setFontSize(7);

            doc.text(`  (${detail.photos.length} photo${detail.photos.length>1?"s":""}attached)`,margin+2,yPos);
            yPos+=2;
            doc.setTextColor(75,85,99);
          }
          yPos+=2; // spacing between details
        });
      }
    }
  });

  // Footer
  yPos=pageHeight-10;
  doc.setFontSize(8);
  doc.setFont("helvetica","italic");
  doc.setTextColor(148,163,184);
  doc.text("This record was generated from VaxBuddy vaccine tracking app.",margin,yPos);

  // Save
  doc.save(`${profile.name}_vaccination_record.pdf`);
}

// Enhanced OCR Image Preprocessing (Canvas-based)
function preprocessImageForOCR(imageDataUrl,callback){
  const img=new Image();
  img.onload=()=>{
    const canvas=document.createElement("canvas");
    const ctx=canvas.getContext("2d");

    // Set canvas size - upscale if image is small
    let width=img.width;
    let height=img.height;
    if(width<600){
      const scale=600/width;
      width=600;
      height=Math.round(height*scale);
    }

    canvas.width=width;
    canvas.height=height;
    ctx.drawImage(img,0,0,width,height);

    // Step 1: Get image data
    let imageData=ctx.getImageData(0,0,width,height);
    const data=imageData.data;

    // Step 2: Convert to grayscale
    for(let i=0;i<data.length;i+=4){
      const r=data[i],g=data[i+1],b=data[i+2];
      const gray=0.299*r+0.587*g+0.114*b;
      data[i]=data[i+1]=data[i+2]=gray;
    }

    // Step 3: Apply bilateral-like smoothing (reduces noise while preserving edges)
    const smoothed=new Uint8ClampedArray(data);
    const radius=2;
    for(let i=4;i<data.length-4;i+=4){
      if(i%(width*4)<(width-radius)*4 && i>(radius*width*4)){
        let sum=0,count=0;
        for(let dy=-radius;dy<=radius;dy++){
          for(let dx=-radius;dx<=radius;dx++){
            const idx=i+(dy*width+dx)*4;
            if(idx>=0 && idx<data.length){
              const val=smoothed[idx];
              const centerVal=smoothed[i];
              // Only include similar pixels (edge-preserving)
              if(Math.abs(val-centerVal)<20){
                sum+=val;
                count++;
              }
            }
          }
        }
        if(count>0) data[i]=data[i+1]=data[i+2]=Math.round(sum/count);
      }
    }

    // Step 4: Increase contrast significantly for text clarity
    for(let i=0;i<data.length;i+=4){
      const val=data[i];
      const contrast=2.0;
      const adjusted=Math.min(255,Math.max(0,(val-128)*contrast+128));
      data[i]=data[i+1]=data[i+2]=adjusted;
    }

    // Step 5: Apply adaptive thresholding (convert to black and white)
    // Calculate local threshold for each pixel
    const blockSize=15;
    const halfBlock=Math.floor(blockSize/2);
    const thresh=new Uint8ClampedArray(data);

    for(let i=0;i<data.length;i+=4){
      const idx=i/4;
      const y=Math.floor(idx/width);
      const x=idx%width;

      // Calculate local mean
      let sum=0,count=0;
      for(let dy=-halfBlock;dy<=halfBlock;dy++){
        for(let dx=-halfBlock;dx<=halfBlock;dx++){
          const ny=y+dy,nx=x+dx;
          if(ny>=0 && ny<height && nx>=0 && nx<width){
            const pidx=(ny*width+nx)*4;
            sum+=data[pidx];
            count++;
          }
        }
      }

      const mean=sum/count;
      const localThreshold=mean-5; // Bias threshold slightly down to catch darker text
      data[i]=data[i+1]=data[i+2]=(data[i]>localThreshold)?255:0;
    }

    ctx.putImageData(imageData,0,0);
    callback(canvas.toDataURL("image/jpeg",0.95));
  };
  img.src=imageDataUrl;
}
// ── Supabase helpers with error handling ──
async function dbRun(fn,onErr){
  try{
    const res=await fn();
    if(res.error)throw res.error;
    return res;
  }catch(e){
    const errorMsg=e?.message||e?.toString()||"Something went wrong";
    console.error("[DBRun Error]",errorMsg,e);
    if(onErr)onErr(errorMsg);
    return null;
  }
}

                                <button onClick={()=>setVaccineDetailsArray(prev=>prev.map(d=>d.id===detail.id?{...d,photos:d.photos.filter(p=>p.id!==photo.id)}:d))} aria-label={`Delete photo ${pidx+1}`} style={{position:"absolute",top:2,right:2,width:18,height:18,padding:0,borderRadius:"50%",background:"rgba(255,59,48,0.9)",color:"white",fontSize:10,fontWeight:700,display:"flex",alignItems:"center",justifyContent:"center"}}>×</button>
                              </div>

              <div style={{display:"flex",gap:8}}>
                <button onClick={()=>{editingVaccineId===v.id?editVaccineDone(v.id):confirmMarkDone(v.id);}} disabled={markingDoneId===v.id} aria-label={`Confirm ${v.name} vaccination`} style={{flex:1,padding:"8px",borderRadius:12,background:P.green,color:"white",fontWeight:700,fontSize:13,opacity:markingDoneId===v.id?0.6:1,display:"flex",alignItems:"center",justifyContent:"center",gap:6}}>
                  {markingDoneId===v.id?<><div style={{width:14,height:14,border:`2px solid rgba(255,255,255,0.4)`,borderTop:`2px solid white`,borderRadius:"50%",animation:"spin 0.8s linear infinite"}}/><span>Confirming...</span></>:"Confirm"}
                </button>
                <button onClick={()=>{setMarkingDone(null);setEditingVaccineId(null);setGivenDate("");setOcrImage(null);setOcrData(null);setVaccinePhotos([]);setViewingPhotoIdx(null);setVaccineDetailsArray([]);}} disabled={markingDoneId===v.id} aria-label="Cancel marking vaccine as done" style={{padding:"8px 14px",borderRadius:12,background:"#F1F5F9",color:"#64748B",fontSize:13,opacity:markingDoneId===v.id?0.5:1}}>Cancel</button>

            </div>
          )}

      )}
    </div>
  );
}

function App(){
  const[session,setSession]=React.useState(null);
  const[authChecked,setAuthChecked]=React.useState(false);
  const[loading,setLoading]=React.useState(true);
  const[view,setView]=React.useState("home");
  const[profiles,setProfiles]=React.useState([]);
  const[selId,setSelId]=React.useState(null);
  const[tab,setTab]=React.useState("upcoming");
  const[expanded,setExpanded]=React.useState(null);
  const[showAdd,setShowAdd]=React.useState(false);
  const[showCustom,setShowCustom]=React.useState(false);
  const[editProfile,setEditProfile]=React.useState(null);
  const[markingDone,setMarkingDone]=React.useState(null);
  const[givenDate,setGivenDate]=React.useState("");
  const[newP,setNewP]=React.useState({name:"",dob:"",avatar:"🐶",photo:null,photoFile:null});
  const[newV,setNewV]=React.useState({name:"",dueDate:"",notes:""});
  const[authMode,setAuthMode]=React.useState("login");
  const[email,setEmail]=React.useState("");
  const[password,setPassword]=React.useState("");
  const[authErr,setAuthErr]=React.useState("");
  const[authLoading,setAuthLoading]=React.useState(false);
  const[localData,setLocalData]=React.useState(null);
  const[saving,setSaving]=React.useState(false);
  const[toast,setToast]=React.useState(null);
  const[migrating,setMigrating]=React.useState(false);
  const[addingCustom,setAddingCustom]=React.useState(false);
  const[markingDoneId,setMarkingDoneId]=React.useState(null);
  const[deletingId,setDeletingId]=React.useState(null);
  const[menuOpen,setMenuOpen]=React.useState(false);
  const menuRef=React.useRef(null);
  const isLoadingProfiles=React.useRef(false);
  const[ocrImage,setOcrImage]=React.useState(null);
  const[ocrData,setOcrData]=React.useState(null);
  const[ocrLoading,setOcrLoading]=React.useState(false);
  const[ocrShowReview,setOcrShowReview]=React.useState(false);
  const[ocrError,setOcrError]=React.useState("");
  const[vaccinePhotos,setVaccinePhotos]=React.useState([]);
  const[viewingPhotoIdx,setViewingPhotoIdx]=React.useState(null);
  const[vaccineDetailsArray,setVaccineDetailsArray]=React.useState([]);
  const[editingVaccineId,setEditingVaccineId]=React.useState(null);
  const[editingDetailId,setEditingDetailId]=React.useState(null);
  const[pullRefresh,setPullRefresh]=React.useState(0);
  const pullStartY=React.useRef(0);
  const sel=profiles.find(p=>p.id===selId);
  const CACHE_KEY="vaxbuddy_profiles_cache";
  const CACHE_TTL=30*60*1000; // 30 minutes

  function showToast(msg,type="success"){setToast({msg,type});setTimeout(()=>setToast(null),3500);}
  function errToast(msg){showToast(msg,"error");}

  function getCache(){try{const cached=JSON.parse(localStorage.getItem(CACHE_KEY));if(cached&&Date.now()-cached.timestamp<CACHE_TTL)return cached.data;localStorage.removeItem(CACHE_KEY);}catch{}return null;}
  function setCache(data){try{localStorage.setItem(CACHE_KEY,JSON.stringify({data,timestamp:Date.now()}));}catch{}}
  function clearCache(){try{localStorage.removeItem(CACHE_KEY);}catch{}}

  // FIX #4: Handle session expiry globally
  React.useEffect(()=>{
    sb.auth.getSession().then(({data:{session}})=>{
      setSession(session);setAuthChecked(true);
      if(session)loadProfiles(session.user.id);
      else setLoading(false);
    });
    const{data:{subscription}}=sb.auth.onAuthStateChange((event,session)=>{
      if(event==="INITIAL_SESSION"||event==="SIGNED_IN"){
        setSession(session);
        if(session)loadProfiles(session.user.id);
        else setLoading(false);
      }else if(event==="TOKEN_REFRESHED"){
        // Token refreshed silently - just update session, don't reload profiles
        if(session)setSession(session);
      }else if(event==="SIGNED_OUT"){
        // User explicitly signed out or session actually expired
        setSession(null);setProfiles([]);setLoading(false);setView("home");
        showToast("You've been signed out. Please log in again.","error");
      }
    });
    return()=>subscription.unsubscribe();
  },[]);

  React.useEffect(()=>{
    if(session){
      const local=getLocal();
      if(local?.profiles?.length>0)setLocalData(local);
    }
  },[session]);

  React.useEffect(()=>{
    if(session&&"Notification"in window&&Notification.permission==="default"){
      Notification.requestPermission();
    }
  },[session]);

  React.useEffect(()=>{
    const handleClickOutside=(e)=>{
      if(menuRef.current&&!menuRef.current.contains(e.target)){
        setMenuOpen(false);
      }
    };
    if(menuOpen){
      document.addEventListener("click",handleClickOutside);
      return()=>document.removeEventListener("click",handleClickOutside);
    }
  },[menuOpen]);

  React.useEffect(()=>{
    const handleTouchStart=(e)=>{
      if(window.scrollY===0){pullStartY.current=e.touches[0].clientY;}
    };
    const handleTouchMove=(e)=>{
      if(pullStartY.current>0&&window.scrollY===0){
        const diff=e.touches[0].clientY-pullStartY.current;
        if(diff>0)setPullRefresh(Math.min(diff,80));
        else{pullStartY.current=0;setPullRefresh(0);}
      }
    };
    const handleTouchEnd=()=>{
      if(pullRefresh>60&&session){
        clearCache();loadProfiles(session.user.id,true);showToast("Refreshing...");
      }
      setPullRefresh(0);pullStartY.current=0;
    };
    document.addEventListener("touchstart",handleTouchStart);
    document.addEventListener("touchmove",handleTouchMove,{passive:true});
    document.addEventListener("touchend",handleTouchEnd);
    return()=>{
      document.removeEventListener("touchstart",handleTouchStart);
      document.removeEventListener("touchmove",handleTouchMove);
      document.removeEventListener("touchend",handleTouchEnd);
    };
  },[pullRefresh,session]);

  async function loadProfiles(uid,forceRefresh=false){
    // Prevent concurrent calls
    if(isLoadingProfiles.current){
      console.log("[LoadProfiles] Already loading, skipping");
      return;
    }
    isLoadingProfiles.current=true;

    // Check cache first (unless forced refresh)
    if(!forceRefresh){
      const cached=getCache();
      if(cached){
        console.log("[LoadProfiles] Using cached data");
        setProfiles(cached);
        setLoading(false);
        isLoadingProfiles.current=false;
        if(Notification.permission==="granted")cached.forEach(p=>scheduleReminders(p.vaccines,p.name));
        return;
      }
    }

    setLoading(true);
    console.log("[LoadProfiles] Starting profile load",forceRefresh?"(forced refresh)":"");
    const res=await dbRun(()=>{console.log("[Query] Loading profiles");return sb.from("profiles").select("id,name,dob,avatar,photo_url,user_id").eq("user_id",uid).order("created_at")},errToast);
    if(!res){setLoading(false);isLoadingProfiles.current=false;return;}
    const profs=res.data||[];
    console.log("[LoadProfiles] Loaded",profs.length,"profiles");
    const full=await Promise.all(profs.map(async p=>{
      console.log("[Query] Loading vaccines for profile",p.name);
      const vres=await dbRun(()=>sb.from("vaccines").select("id,profile_id,name,done,done_date,due_date,age_months,custom,notes,photos").eq("profile_id",p.id),errToast);
      // FIX #5: resolve signed URLs for private photos (with timeout to prevent blocking)
      let photoUrl=null;
      if(p.photo_url){
        if(p.photo_url.startsWith("data:")){
          photoUrl=p.photo_url;
        }else{
          // Use timeout to prevent blocking on slow storage requests
          photoUrl=await Promise.race([
            getSignedUrl(p.photo_url).catch(()=>p.photo_url),
            new Promise(resolve=>setTimeout(()=>resolve(p.photo_url),2000))
          ]).catch(()=>p.photo_url);
        }
      }
      return{...p,photo_url:photoUrl,vaccines:vres?.data||[]};
    }));
    setProfiles(full);
    setCache(full);
    setLoading(false);
    isLoadingProfiles.current=false;
    console.log("[LoadProfiles] Completed");
    if(Notification.permission==="granted")full.forEach(p=>scheduleReminders(p.vaccines,p.name));
  }

  // FIX #3: Check email confirmed
  async function signIn(){
    setAuthLoading(true);setAuthErr("");
    const{data,error}=await sb.auth.signInWithPassword({email,password});
    if(error){setAuthErr(error.message);setAuthLoading(false);return;}
    if(data.user&&!data.user.email_confirmed_at){
      await sb.auth.signOut();
      setAuthErr("Please confirm your email before logging in.");
      setAuthLoading(false);return;
    }
    setAuthLoading(false);
  }
  async function signUp(){
    setAuthLoading(true);setAuthErr("");
    const{error}=await sb.auth.signUp({email,password});
    if(error)setAuthErr(error.message);
    else setAuthErr("Check your email to confirm your account, then log in.");
    setAuthLoading(false);
  }
  async function resendConfirmation(){
    if(!email){setAuthErr("Enter your email first");return;}
    setAuthLoading(true);
    const{error}=await sb.auth.resend({type:"signup",email});
    if(error)setAuthErr(error.message);
    else setAuthErr("Confirmation email sent! Check your inbox.");
    setAuthLoading(false);
  }
  async function signOut(){
    // Clear notification cache before logout for privacy
    try{localStorage.removeItem(NOTIFICATION_KEY);}catch{}
    await sb.auth.signOut();
  }

  // FIX #11: Check for existing profiles before migrating
  async function migrateLocalData(){
    if(!localData||!session||migrating)return;
    setMigrating(true);
    const{data:existing}=await sb.from("profiles").select("id").eq("user_id",session.user.id);
    if(existing?.length>0){
      showToast("Account already has data. Skipping import to avoid duplicates.","error");
      setLocalData(null);localStorage.removeItem(LOCAL_KEY);setMigrating(false);return;
    }
    try{
      for(const p of localData.profiles){
        const{data:prof,error}=await sb.from("profiles").insert({
          id:uid(),user_id:session.user.id,name:p.name,dob:p.dob,avatar:p.avatar,photo_url:p.photo||null
        }).select("id").single();
        if(error)throw error;
        if(prof){
          const vaxRows=p.vaccines.map(v=>({
            id:uid(),profile_id:prof.id,user_id:session.user.id,
            name:v.name,due_date:v.dueDate,done:v.done,done_date:v.doneDate||null,
            notes:v.notes||null,age_months:v.ageMonths,custom:v.custom||false,reminder_set:false,
          }));
          const{error:ve}=await sb.from("vaccines").insert(vaxRows);
          if(ve)throw ve;
        }
      }
      localStorage.removeItem(LOCAL_KEY);
      setLocalData(null);
      await loadProfiles(session.user.id);
      showToast("Local data imported successfully!");
    }catch(e){errToast(e.message||"Import failed");}
    setMigrating(false);
  }

  // FIX #2: Strict photo upload — fail hard, no base64 fallback to DB
  async function uploadPhoto(file){
    const ext=file.name.split(".").pop().toLowerCase();
    const allowed=["jpg","jpeg","png","webp","heic"];
    if(!allowed.includes(ext)){errToast("Unsupported image format. Allowed: JPG, PNG, WebP, HEIC");return null;}
    if(file.size>MAX_PHOTO_SIZE){errToast("Photo must be under 5MB");return null;}
    const path=`${session.user.id}/${uid()}.${ext}`;
    const{error}=await sb.storage.from("photos").upload(path,file,{upsert:true});
    if(error){errToast("Failed to upload photo: "+error.message);return null;}
    return path; // store path, not public URL
  }

  // Get signed URL from storage path
  async function getSignedUrl(path,expirySeconds=SIGNED_URL_EXPIRY){
    if(!path)return null;
    try{
      const{data,error}=await sb.storage.from("photos").createSignedUrl(path,expirySeconds);
      if(error)return null;
      return data?.signedUrl||null;
    }catch{return null;}
  }

  // Extract vaccine data from image using Grok Vision
  async function extractVaccineDataFromImage(file){
    try{
      // Convert file to base64
      const dataUrl=await new Promise((resolve,reject)=>{
        const reader=new FileReader();
        reader.onload=()=>resolve(reader.result);
        reader.onerror=()=>reject(reader.error);
        reader.readAsDataURL(file);
      });

      // Extract just the base64 part (remove "data:image/...;base64," prefix)
      const base64=dataUrl.split(',')[1];

      // Call backend API to extract data
      const response=await fetch('/api/extract-vaccine-data',{
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body:JSON.stringify({imageBase64:base64})
      });

      const result=await response.json();

      if(result.success&&result.data){
        console.log("[Grok Extraction] Success",result.data);
        return result.data;
      }else{
        console.log("[Grok Extraction] Failed",result.error);
        return null;
      }
    }catch(error){
      console.error("[Grok Extraction] Error:",error);
      return null;
    }
  }

  function handleVaccinePhotoUpload(file,detailId){
    const reader=new FileReader();
    reader.onload=(event)=>{
      const preview=event.target?.result;
      if(!preview)return;
      const photoId=Date.now().toString();
      uploadPhoto(file).then(path=>{
        if(!path){errToast("Failed to upload photo");return;}
        setVaccineDetailsArray(prev=>prev.map(d=>d.id===detailId?{...d,photos:[...(d.photos||[]),{id:photoId,path:path,preview:preview,uploadedAt:new Date().toISOString()}]}:d));
      }).catch(err=>{errToast(err.message||"Failed to upload photo");});
    };
    reader.readAsDataURL(file);
    extractVaccineDataFromImage(file).then(extractedData=>{
      if(extractedData){
        setVaccineDetailsArray(prev=>prev.map(d=>{if(d.id===detailId){return{...d,name:extractedData.name||d.name||'',batch:extractedData.batch||d.batch||'',expiry:extractedData.expiry||d.expiry||'',manufacturer:extractedData.manufacturer||d.manufacturer||'',dateManufactured:extractedData.dateManufactured||d.dateManufactured||''};}return d;}));
        showToast('Vaccine data extracted from image!','success');
      }else{
        showToast('Could not extract vaccine data from image (optional, you can enter manually)','info');
      }
    }).catch(err=>{console.error('Extraction error:',err);showToast('Could not extract vaccine data (optional)','info');});
  }

  async function saveEditProfile(){
    if(!editProfile.name.trim()||!editProfile.dob){showToast("Name and DOB required","error");return;}
    setSaving(true);
    try{
      let photoPath=sel.photo_url||null;
      if(editProfile.photoFile){
        const p=await uploadPhoto(editProfile.photoFile);
        if(!p){setSaving(false);return;}
        photoPath=p;
      }else if(editProfile.photo===null){
        photoPath=null;
      }
      const dobChanged=editProfile.dob!==sel.dob;
      if(dobChanged&&!confirm("Changing date of birth will recalculate all vaccine due dates. Continue?")){setSaving(false);return;}
      const{error}=await sb.from("profiles").update({
        name:editProfile.name.trim(),dob:editProfile.dob,
        avatar:editProfile.avatar,photo_url:photoPath
      }).eq("id",sel.id);
      if(error)throw error;
      if(dobChanged){
        const updates=sel.vaccines.filter(v=>!v.custom).map(v=>
          sb.from("vaccines").update({due_date:calcDue(editProfile.dob,v.age_months)}).eq("id",v.id)
        );
        const results=await Promise.all(updates);
        const failedResults=results.filter(r=>r.error);
        if(failedResults.length>0){
          const errors=failedResults.map(r=>r.error.message).join(", ");
          throw new Error(`Failed to update ${failedResults.length} vaccine dates: ${errors}`);
        }
      }
      setEditProfile(null);
      await loadProfiles(session.user.id);
      showToast("Profile updated!");
    }catch(e){errToast(e.message||"Failed to update profile");}
    setSaving(false);
  }

  // FIX #9: Confetti only after confirmed DB write
  async function confirmMarkDone(vid,ocrDataParam=null,isEditMode=false){
    const vaccine = sel.vaccines.find(v=>v.id===vid);
    const today = new Date().toISOString().split("T")[0];
    const dateToSave = givenDate && givenDate.trim() ? givenDate : (vaccine?.due_date || today);

    // Merge OCR data into first detail entry if provided
    let detailsToSave = vaccineDetailsArray;
    if(ocrDataParam){
      if(detailsToSave.length===0){
        detailsToSave=[{
          id:uid(),
          name:ocrDataParam.vaccineName||"",
          batch:ocrDataParam.batchNumber||"",
          expiry:ocrDataParam.expiryDate||"",
          manufacturer:ocrDataParam.manufacturer||"",
          dateManufactured:ocrDataParam.dateManufactured||"",
          photos:[]
        }];
      }else{
        detailsToSave=[{...detailsToSave[0],
          name:ocrDataParam.vaccineName||detailsToSave[0].name||"",
          batch:ocrDataParam.batchNumber||detailsToSave[0].batch||"",
          expiry:ocrDataParam.expiryDate||detailsToSave[0].expiry||"",
          manufacturer:ocrDataParam.manufacturer||detailsToSave[0].manufacturer||"",
          dateManufactured:ocrDataParam.dateManufactured||detailsToSave[0].dateManufactured||""
        },...detailsToSave.slice(1)];
      }
    }

    // Serialize vaccine details array with photos
    const notesToSave = serializeVaccineDetails(detailsToSave);

    setMarkingDoneId(vid);
    // Store original vaccine state in case we need to rollback
    const originalVaccine = sel.vaccines.find(v=>v.id===vid);
    try{
      const updateData={done:true,reminder_set:false,notes:notesToSave};
      // Only update done_date if not in edit mode or if date changed
      if(!isEditMode||givenDate){
        updateData.done_date=dateToSave;
      }
      const{error}=await sb.from("vaccines").update(updateData).eq("id",vid);
      if(error)throw error;
      // Only after DB succeeds: update optimistic local state
      setProfiles(prev=>prev.map(p=>p.id!==selId?p:{...p,
        vaccines:p.vaccines.map(v=>v.id!==vid?v:{...v,done:true,done_date:updateData.done_date||v.done_date,reminder_set:false,notes:notesToSave})
      }));
      fireConfetti(); // only fires after DB success and local state update
      // Clear form state after everything succeeds
      setMarkingDone(null);
      setEditingVaccineId(null);
      setGivenDate("");
      setVaccinePhotos([]);
      setVaccineDetailsArray([]);
      setOcrData(null);
      setOcrImage(null);
    }catch(e){
      errToast(e.message||"Failed to update vaccine");
      // Rollback optimistic update on error
      setProfiles(prev=>prev.map(p=>p.id!==selId?p:{...p,
        vaccines:p.vaccines.map(v=>v.id!==vid?v:originalVaccine)
      }));
      // Keep form open so user can retry without losing data
    }finally{setMarkingDoneId(null);}
  }

  // ── CHILD VIEW ──
  if(view==="child"&&sel){

    const getAgeMonths=(v)=>{

      return(dueMs-dobMs)/(1000*60*60*24*30.44);

    const sortByAge=(arr)=>[...arr].sort((a,b)=>getAgeMonths(a)-getAgeMonths(b));

    const upcoming30=sortByAge(allVax.filter(v=>!v.done&&getStatus(v.due_date).diff>7&&getStatus(v.due_date).diff<=30));

    const sortedFuture=sortByAge(future);
    const sortedAll=sortByAge(allVax);

                <button onClick={()=>{const completedVaxes=sel.vaccines.filter(v=>v.done).sort((a,b)=>new Date(b.done_date)-new Date(a.done_date));generateVaccinePDF(sel,completedVaxes);setMenuOpen(false);}} aria-label="Export vaccination record as PDF" role="menuitem" style={{display:"flex",alignItems:"center",gap:10,width:"100%",padding:"12px 14px",border:"none",background:"none",cursor:"pointer",fontSize:14,color:"#1E293B",fontWeight:500,borderBottom:`1px solid ${P.purpleLight}`}}>

        {tab==="upcoming"&&(

            {upcoming7.length>0&&<><p style={{margin:"10px 0 8px",fontSize:12,fontWeight:700,color:P.yellowDark}}>⏰ THIS WEEK</p>{upcoming7.map(v=><VaxCard key={v.id} v={v} expanded={expanded} setExpanded={setExpanded} markingDone={markingDone} setMarkingDone={setMarkingDone} givenDate={givenDate} setGivenDate={setGivenDate} vaccinePhotos={vaccinePhotos} setVaccinePhotos={setVaccinePhotos} viewingPhotoIdx={viewingPhotoIdx} setViewingPhotoIdx={setViewingPhotoIdx} markingDoneId={markingDoneId} deletingId={deletingId} confirmMarkDone={confirmMarkDone} markUndone={markUndone} deleteCustomVaccine={deleteCustomVaccine} uploadPhoto={uploadPhoto} getSignedUrl={getSignedUrl} getStatus={getStatus} getAgeLabel={getAgeLabel} P={P} ocrImage={ocrImage} setOcrImage={setOcrImage} ocrData={ocrData} setOcrData={setOcrData} vaccineDetailsArray={vaccineDetailsArray} setVaccineDetailsArray={setVaccineDetailsArray} editingVaccineId={editingVaccineId} setEditingVaccineId={setEditingVaccineId} editVaccineDone={editVaccineDone} handleVaccinePhotoUpload={handleVaccinePhotoUpload}/>)}</>}
            {upcoming30.length>0&&<><p style={{margin:"10px 0 8px",fontSize:12,fontWeight:700,color:P.tealDark}}>THIS MONTH</p>{upcoming30.map(v=><VaxCard key={v.id} v={v} expanded={expanded} setExpanded={setExpanded} markingDone={markingDone} setMarkingDone={setMarkingDone} givenDate={givenDate} setGivenDate={setGivenDate} vaccinePhotos={vaccinePhotos} setVaccinePhotos={setVaccinePhotos} viewingPhotoIdx={viewingPhotoIdx} setViewingPhotoIdx={setViewingPhotoIdx} markingDoneId={markingDoneId} deletingId={deletingId} confirmMarkDone={confirmMarkDone} markUndone={markUndone} deleteCustomVaccine={deleteCustomVaccine} uploadPhoto={uploadPhoto} getSignedUrl={getSignedUrl} getStatus={getStatus} getAgeLabel={getAgeLabel} P={P} ocrImage={ocrImage} setOcrImage={setOcrImage} ocrData={ocrData} setOcrData={setOcrData} vaccineDetailsArray={vaccineDetailsArray} setVaccineDetailsArray={setVaccineDetailsArray} editingVaccineId={editingVaccineId} setEditingVaccineId={setEditingVaccineId} editVaccineDone={editVaccineDone} handleVaccinePhotoUpload={handleVaccinePhotoUpload}/>)}</>}
            {overdue.length===0&&upcoming7.length===0&&upcoming30.length===0&&(
              <div style={{textAlign:"center",padding:"2rem 1rem"}}>
                <p style={{fontWeight:700,color:"#1E293B",margin:"8px 0 4px"}}>All clear!</p>
                <p style={{fontSize:13,color:"#94A3B8"}}>No vaccines due soon</p>
              </div>
            )}
            {sortedFuture.length>0&&(
              <div style={{marginTop:12}}>
                <p style={{margin:"0 0 8px",fontSize:12,fontWeight:700,color:"#94A3B8"}}>🔮 COMING UP</p>
                {sortedFuture.map(v=><VaxCard key={v.id} v={v} expanded={expanded} setExpanded={setExpanded} markingDone={markingDone} setMarkingDone={setMarkingDone} givenDate={givenDate} setGivenDate={setGivenDate} vaccinePhotos={vaccinePhotos} setVaccinePhotos={setVaccinePhotos} viewingPhotoIdx={viewingPhotoIdx} setViewingPhotoIdx={setViewingPhotoIdx} markingDoneId={markingDoneId} deletingId={deletingId} confirmMarkDone={confirmMarkDone} markUndone={markUndone} deleteCustomVaccine={deleteCustomVaccine} uploadPhoto={uploadPhoto} getSignedUrl={getSignedUrl} getStatus={getStatus} getAgeLabel={getAgeLabel} P={P} ocrImage={ocrImage} setOcrImage={setOcrImage} ocrData={ocrData} setOcrData={setOcrData} vaccineDetailsArray={vaccineDetailsArray} setVaccineDetailsArray={setVaccineDetailsArray} editingVaccineId={editingVaccineId} setEditingVaccineId={setEditingVaccineId} editVaccineDone={editVaccineDone} handleVaccinePhotoUpload={handleVaccinePhotoUpload}/>)}
              </div>
            )}
          </>
        )}
        {tab==="all"&&sortedAll.map(v=><VaxCard key={v.id} v={v} expanded={expanded} setExpanded={setExpanded} markingDone={markingDone} setMarkingDone={setMarkingDone} givenDate={givenDate} setGivenDate={setGivenDate} vaccinePhotos={vaccinePhotos} setVaccinePhotos={setVaccinePhotos} viewingPhotoIdx={viewingPhotoIdx} setViewingPhotoIdx={setViewingPhotoIdx} markingDoneId={markingDoneId} deletingId={deletingId} confirmMarkDone={confirmMarkDone} markUndone={markUndone} deleteCustomVaccine={deleteCustomVaccine} uploadPhoto={uploadPhoto} getSignedUrl={getSignedUrl} getStatus={getStatus} getAgeLabel={getAgeLabel} P={P} ocrImage={ocrImage} setOcrImage={setOcrImage} ocrData={ocrData} setOcrData={setOcrData} vaccineDetailsArray={vaccineDetailsArray} setVaccineDetailsArray={setVaccineDetailsArray} editingVaccineId={editingVaccineId} setEditingVaccineId={setEditingVaccineId} editVaccineDone={editVaccineDone} handleVaccinePhotoUpload={handleVaccinePhotoUpload}/>)}

                <div>
                  <label style={{fontSize:12,fontWeight:600,color:"#64748B",display:"block",marginBottom:4}}>Manufacturer</label>
                  <input type="text" value={ocrData.manufacturer||""} onChange={e=>setOcrData({...ocrData,manufacturer:e.target.value})} placeholder="e.g., Serum Institute" aria-label="Manufacturer"/>
                </div>

                <div>
                  <label style={{fontSize:12,fontWeight:600,color:"#64748B",display:"block",marginBottom:4}}>Date Manufactured</label>
                  <input type="text" value={ocrData.dateManufactured||""} onChange={e=>setOcrData({...ocrData,dateManufactured:e.target.value})} placeholder="e.g., 01/2025" aria-label="Date manufactured"/>
                </div>

                <div>
                  <label style={{fontSize:12,fontWeight:600,color:"#64748B",display:"block",marginBottom:4}}>Lot Number</label>
                  <input type="text" value={ocrData.lotNumber||""} onChange={e=>setOcrData({...ocrData,lotNumber:e.target.value})} placeholder="e.g., LOT123" aria-label="Lot number"/>
                </div>

                <p style={{fontSize:11,color:"#94A3B8",margin:"8px 0 0"}}>You can edit any field before confirming</p>

                <div style={{display:"flex",gap:8,marginTop:12}}>
                  <button onClick={()=>{
                    if(ocrData.vaccineName){
                      confirmMarkDone(markingDone,ocrData);
                      setOcrShowReview(false);
                      setOcrImage(null);
                      setOcrData(null);
                      setOcrError("");
                    }
                  }} disabled={!ocrData.vaccineName} aria-label="Confirm vaccine data and mark as done" style={{flex:1,padding:"10px",borderRadius:12,background:P.green,color:"white",fontWeight:700,fontSize:13,opacity:!ocrData.vaccineName?0.6:1}}>
                    Confirm
                  </button>
                  <button onClick={()=>{setOcrShowReview(false);setOcrImage(null);setOcrData(null);setOcrError("");}} aria-label="Cancel without saving extracted data" style={{padding:"10px 14px",borderRadius:12,background:"#F1F5F9",color:"#64748B",fontWeight:600,fontSize:13}}>Cancel</button>
                </div>
              </div>
            )}
          </div>
            </div>
          </div>
        )}
        {viewingPhotoIdx!==null&&vaccinePhotos&&vaccinePhotos[viewingPhotoIdx]&&(
          <div onClick={()=>setViewingPhotoIdx(null)} style={{position:"fixed",top:0,left:0,right:0,bottom:0,background:"rgba(0,0,0,0.9)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:9999}}>
            <div onClick={e=>e.stopPropagation()} style={{position:"relative",width:"90%",maxWidth:400}}>
              <img src={vaccinePhotos[viewingPhotoIdx].preview||vaccinePhotos[viewingPhotoIdx].dataUrl||vaccinePhotos[viewingPhotoIdx].path} alt="Full view" style={{width:"100%",borderRadius:8}}/>
              <button onClick={()=>setViewingPhotoIdx(null)} aria-label="Close photo viewer" style={{position:"absolute",top:10,right:10,width:32,height:32,padding:0,borderRadius:"50%",background:"rgba(255,255,255,0.2)",color:"white",fontSize:20,fontWeight:700,display:"flex",alignItems:"center",justifyContent:"center"}}>×</button>
            </div>
          </div>
        )}
      </div>
    );
  }

  return null;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
